<!DOCTYPE html>
<html lang="en">
<head>
    <!-- NOTE: page-level meta-refresh removed on purpose.
         Refreshing is now handled entirely in JS (reloadCameras) so the two
         mechanisms can't race. A full-document meta-refresh also caused a
         visible flash; the JS reload tears players down cleanly instead. -->
    <meta charset="UTF-8">
    <title>Kiosk Mode</title>
    <script src="./vendor/hls/hls.min.js"></script>
    <script src="./vendor/ovenplayer/ovenplayer.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
        }
        #wrapper {
            display: grid;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
        }
        .camera-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Video fits nicely */
        }
        .camera-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            padding: 5px 0;
            font-size: 1.2rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="wrapper" class="player-wrapper"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const camsParam = urlParams.get('cams');

        // Allow the refresh interval to be set via ?refresh=<seconds>.
        // Falls back to 300 seconds (5 minutes) if the param is missing/invalid.
        const refreshParam = parseInt(urlParams.get('refresh'), 10);
        const REFRESH_SECONDS = (Number.isFinite(refreshParam) && refreshParam > 0)
            ? refreshParam
            : 300;
        const REFRESH_INTERVAL_MS = REFRESH_SECONDS * 1000;

        let cameras = [];
        let playerContainers = {};

        if (camsParam) {
            cameras = camsParam.split(',').map(cam => cam.trim()).filter(cam => cam.length > 0);
        }

        // Tear down a single OvenPlayer instance and release all its resources.
        // OvenPlayer's documented teardown method is .remove() (NOT .destroy()).
        // Using the wrong method silently threw and left every player alive,
        // leaking MediaSource buffers/decoders on each refresh until the
        // machine locked up. We defensively support .remove(), and fall back
        // to .destroy() only if a fork exposes that instead.
        function destroyPlayer(player) {
            try {
                if (player && typeof player.remove === 'function') {
                    player.remove();
                } else if (player && typeof player.destroy === 'function') {
                    player.destroy();
                }
            } catch (e) {
                console.error('Error removing player', e);
            }
        }

        function loadCameras() {
            const wrapper = document.getElementById('wrapper');
            wrapper.innerHTML = ''; // Clear previous DOM

            cameras.forEach(name => {
                const container = document.createElement('div');
                container.className = 'camera-container';

                const playerDiv = document.createElement('div');
                playerDiv.className = 'camera-preview';
                playerDiv.id = `player-${name}`;

                const overlay = document.createElement('div');
                overlay.className = 'camera-overlay';
                overlay.innerText = name; // Show camera name overlay

                container.appendChild(playerDiv);
                container.appendChild(overlay);
                wrapper.appendChild(container);

                const player = OvenPlayer.create(playerDiv.id, {
                    autoStart: true,
                    mute: true,
                    controls: false,
                    sources: [{
                        file: `hls/${name}.m3u8`,
                        label: "hls",
                        type: "hls"
                    }],
                });

                playerContainers[playerDiv.id] = player;
            });

            updateGridLayout(); // Setup the grid
        }

        function reloadCameras() {
            // Properly release every existing player BEFORE creating new ones.
            Object.values(playerContainers).forEach(destroyPlayer);
            playerContainers = {};
            loadCameras();
        }

        function updateGridLayout() {
            const wrapper = document.getElementById('wrapper');
            const camCount = cameras.length;
            let rows = Math.floor(Math.sqrt(camCount));
            let cols = Math.ceil(camCount / rows);

            wrapper.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        }

        if (cameras.length > 0) {
            loadCameras();
            setInterval(reloadCameras, REFRESH_INTERVAL_MS);
        } else {
            document.getElementById('wrapper').innerHTML =
                '<p style="text-align: center; margin-top: 50px; color: white;">No cameras specified. Please add ?cams=Cam1,Cam2 to the URL.</p>';
        }

        // Release players if the page itself is being unloaded/navigated,
        // so a full reload doesn't leave orphaned decoders behind.
        window.addEventListener('pagehide', () => {
            Object.values(playerContainers).forEach(destroyPlayer);
            playerContainers = {};
        });

        // Optional: Fullscreen on first click
        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('click', () => {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn('Fullscreen request failed', err);
                });
            }, { once: true }); // Only the first click
        });
    </script>
</body>
</html>
