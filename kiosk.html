<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kiosk Mode</title>
    <script src="./vendor/hls/hls.min.js"></script>
    <script src="./vendor/ovenplayer/ovenplayer.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
        }
        #wrapper {
            display: grid;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
        }
        .camera-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            padding: 5px 0;
            font-size: 1.2rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="wrapper" class="player-wrapper"></div>

    <script>
        //
        // Kiosk view: composes a grid of camera streams.
        //
        // URL parameters:
        //   cams      Comma-separated list of cameras to display, in order.
        //   refresh   Optional. Seconds between full player rebuilds.
        //             Defaults to 300 (5 minutes) when omitted.
        //
        // Each entry in ?cams= may name an application explicitly with an
        // "app:" prefix, or fall back to DEFAULT_APP when no prefix is given:
        //
        //   "FrontDoor"           -> DEFAULT_APP  -> hls/FrontDoor.m3u8
        //   "cam-sub:FrontDoor"   -> cam-sub app  -> sub-hls/FrontDoor.m3u8
        //
        // The "app:" prefix (colon, not slash) keeps the flat stream names
        // used by nginx-rtmp intact. See appHlsBase() below to map an
        // application name to the URL location that serves its HLS.
        //
        // Example:
        //   kiosk.html?cams=cam-sub:FrontDoor,cam-sub:SideDoor,Lobby&refresh=120
        //

        // Default application used when a cams entry has no "app:" prefix.
        const DEFAULT_APP = 'cam';

        const urlParams = new URLSearchParams(window.location.search);
        const camsParam = urlParams.get('cams');

        // Refresh interval in milliseconds. ?refresh=N is read as seconds and
        // must be a positive number; otherwise we fall back to 300 seconds.
        const DEFAULT_REFRESH_SECONDS = 300;
        const refreshParam = parseInt(urlParams.get('refresh'), 10);
        const refreshSeconds = (Number.isFinite(refreshParam) && refreshParam > 0)
            ? refreshParam
            : DEFAULT_REFRESH_SECONDS;
        const REFRESH_INTERVAL_MS = refreshSeconds * 1000;

        let cameras = [];
        let playerContainers = {};
        let refreshTimer = null;

        // Map an nginx-rtmp application name to the URL prefix that serves its
        // HLS playlists. nginx-rtmp writes a flat <name>.m3u8 per application,
        // and the site serves each application's hls_path under its own
        // location. Adjust these to match your nginx "default" site if you add
        // or rename applications.
        function appHlsBase(app) {
            switch (app) {
                // High-res recording/live application -> /hls (hls_path /tmp/hls)
                case 'cam':
                    return 'hls';
                // Lower-res sharing application -> /sub-hls (hls_path /tmp/sub-hls)
                case 'cam-sub':
                    return 'sub-hls';
                // Fall back to /hls/<app> for any other application name.
                default:
                    return `hls/${app}`;
            }
        }

        // Build the HLS playlist URL for a parsed camera entry.
        function hlsUrl(cam) {
            return `${appHlsBase(cam.app)}/${cam.name}.m3u8`;
        }

        // Parse the ?cams= list into { app, name, label } objects.
        if (camsParam) {
            cameras = camsParam.split(',').map(entry => {
                entry = entry.trim();
                if (!entry) return null;

                const colonIdx = entry.indexOf(':');
                if (colonIdx !== -1) {
                    return {
                        app: entry.substring(0, colonIdx),
                        name: entry.substring(colonIdx + 1),
                        label: entry.substring(colonIdx + 1)
                    };
                }

                return {
                    app: DEFAULT_APP,
                    name: entry,
                    label: entry
                };
            }).filter(Boolean);
        }

        function loadCameras() {
            const wrapper = document.getElementById('wrapper');
            wrapper.innerHTML = '';

            cameras.forEach(cam => {
                const container = document.createElement('div');
                container.className = 'camera-container';

                const playerDiv = document.createElement('div');
                playerDiv.className = 'camera-preview';
                playerDiv.id = `player-${cam.app}-${cam.name}`;

                const overlay = document.createElement('div');
                overlay.className = 'camera-overlay';
                overlay.innerText = cam.label;

                container.appendChild(playerDiv);
                container.appendChild(overlay);
                wrapper.appendChild(container);

                const player = OvenPlayer.create(playerDiv.id, {
                    autoStart: true,
                    mute: true,
                    controls: false,
                    sources: [{
                        file: hlsUrl(cam),
                        label: 'hls',
                        type: 'hls'
                    }],
                });

                playerContainers[playerDiv.id] = player;
            });

            updateGridLayout();
        }

        function reloadCameras() {
            Object.values(playerContainers).forEach(player => {
                try {
                    player.destroy();
                } catch (e) {
                    console.error('Error destroying player', e);
                }
            });
            playerContainers = {};
            loadCameras();
        }

        function updateGridLayout() {
            const wrapper = document.getElementById('wrapper');
            const camCount = cameras.length;
            if (camCount === 0) return;

            const rows = Math.max(1, Math.floor(Math.sqrt(camCount)));
            const cols = Math.ceil(camCount / rows);

            wrapper.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        }

        if (cameras.length > 0) {
            loadCameras();
            refreshTimer = setInterval(reloadCameras, REFRESH_INTERVAL_MS);
        } else {
            document.getElementById('wrapper').innerHTML =
                '<p style="color:white;text-align:center;margin-top:50px;">' +
                'No cameras specified.<br>' +
                'Usage: ?cams=CamName,app:CamName&amp;refresh=300<br>' +
                'Examples:<br>' +
                '&nbsp;&nbsp;?cams=FrontDoor,SideDoor<br>' +
                '&nbsp;&nbsp;?cams=cam-sub:FrontDoor,cam-sub:Lobby&amp;refresh=120' +
                '</p>';
        }

        // Fullscreen on first click.
        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('click', () => {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn('Fullscreen request failed', err);
                });
            }, { once: true });
        });
    </script>
</body>
</html>
