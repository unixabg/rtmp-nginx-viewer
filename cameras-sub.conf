# Low-resolution sub-stream pulls for the cam-sub application.
#
# These feed kiosk.html grids so the viewing station decodes small
# streams instead of full-resolution main streams. Pull the camera's
# native sub/second stream where available (much cheaper than letting
# the server transcode).
#
# Use the SAME name= value as the matching entry in cameras.conf so a
# camera is addressable as both cam/<name> (main) and cam-sub/<name>.
#
# Reolink example (channel0_sub is the low-res stream):
#pull rtmp://ipAddress/bcs/channel0_sub.bcs?channel=0&stream=0&user=admin&password=yourPassword name=CamName static;
